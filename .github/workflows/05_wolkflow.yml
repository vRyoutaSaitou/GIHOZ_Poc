name: Generate and Notify Report

on:
  push:
    branches: [main]

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate report.json from MagicPod (Get only)
        env:
          MAGICPOD_TOKEN: ${{ secrets.MAGICPOD_TOKEN }}
        run: |
          python 01_magicpod_report.py \
          --org VeriServe \
          --project WebTraining \
          --token "$MAGICPOD_TOKEN" \
          --batch-run-number 232 \
          --out report.json \

      - name: Run xlsx conversion script
        run: |
          python 02_xlsx_conversion.py report.json

      - name: Run Slack notification script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK }}
          TEST_REPORTER: "齊藤僚太"
        run: |
          python 03_slack_send.py


      - name: Upload xlsx artifact
        uses: actions/upload-artifact@v5
        with:
          name: xlsx-report
          path: |
            *.xlsx
