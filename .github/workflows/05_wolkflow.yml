name: Generate and Notify Report

on:
  push:
    branches: [main]

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate report.json from MagicPod (Get only)
        env:
          MAGICPOD_TOKEN: ${{ secrets.MAGICPOD_TOKEN }}
        run: |
          python 01_magicpod_report.py \
          --org VeriServe \
          --project WebTraining \
          --token "$MAGICPOD_TOKEN" \
          --latest \
          --errors \
          --note \
          --out report.json \

      - name: Generate report.json from MagicPod (latest -> 01)
        env:
          MAGICPOD_TOKEN: ${{ secrets.MAGICPOD_TOKEN }}
        run: |
          python 02_magicpod_pick_latest_and_generate.py \
          --org VeriServe \
          --project WebTraining \
          --token "$MAGICPOD_TOKEN" \
          --count 20 \
          --errors \
          --note \
          --out report.json

      - name: Run xlsx conversion script
        run: |
          python 03_xlsx_conversion.py report.json

      - name: Debug report.json (before slack)
        run: |
          python - << 'PY'
          import json
          d=json.load(open('report.json',encoding='utf-8'))
          r=d.get('test_results',[])
          print('test_name=', d.get('test_name'))
          print('status=', d.get('status'))
          print('total=', len(r))
          print('pass=', sum(str(x.get('result','')).lower()=='pass' for x in r))
          print('fail=', sum(str(x.get('result','')).lower()=='fail' for x in r))
          print('first3=', r[:3])
          PY

      - name: Run Slack notification script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK }}
          MAGICPOD_BATCHRUN_URL_TEMPLATE: "https://app.magicpod.com/VeriServe/WebTraining/batch-run/233/pattern-index/0/1/"
          TEST_REPORTER: "齊藤僚太"
        run: |
          python 04_slack_send.py


      - name: Upload xlsx artifact
        uses: actions/upload-artifact@v5
        with:
          name: xlsx-report
          path: |
            report.json
            *.xlsx
